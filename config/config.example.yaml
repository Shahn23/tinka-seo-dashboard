# SEO Dashboard Configuration
# Copy this to config.yaml and fill in your settings

database:
  path: "data/seo_dashboard.db"

gsc:
  enabled: false
  # Path to your GCP service account JSON key
  service_account_file: ""
  # Site URLs in GSC format (sc-domain: or https://)
  site_urls:
    - "sc-domain:giantbubbles.co.nz"
    - "sc-domain:giantbubblesau.com"

dashboard:
  title: "Tinka SEO Dashboard"
  refresh_interval_seconds: 3600
  default_days: 30
